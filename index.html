<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פלטפורמות מסחר - המלצות של אלברט אהרון</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2em;
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .platforms-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            border-right: 4px solid;
            transition: all 0.3s ease;
        }

        .platform:hover {
            background: #f0f0f0;
            transform: translateX(-5px);
        }

        .platform-logo {
            min-width: 80px;
            width: 80px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-logo img {
            max-width: 80px;
            max-height: 40px;
            object-fit: contain;
        }

        .platform:nth-child(1) {
            border-right-color: #1e88e5;
        }

        .platform:nth-child(2) {
            border-right-color: #f57c00;
        }

        .platform:nth-child(3) {
            border-right-color: #43a047;
        }

        .platform-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .platform-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .platform-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .platform-link:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .platform {
                flex-direction: column;
                text-align: center;
            }

            .platform-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>פלטפורמות מסחר</h1>
            <p style="color: #666; font-size: 0.95em;">🎯 המלצות של אלברט אהרון</p>
        </div>

        <div class="platforms-list">
            <div class="platform">
                <div class="platform-logo"><img src="https://www.meitav.co.il/media/1hth1iw1/410917_logo_151x73-01.svg" alt="מיטב"></div>
                <span class="platform-name">מיטב טרייד</span>
                <a href="https://landing.meitav.co.il/he-IL/landing/trade/tradeleadsfreinds?utm_medium=7F348453D8BBF8D76EDF658AC8D24937" 
                   class="platform-link" 
                   target="_blank" 
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo"><img src="https://www.xnes.co.il/media/j52ggxis/logoxnes.svg" alt="אקסלנס"></div>
                <span class="platform-name">אקסלנס טרייד</span>
                <a href="https://xnestrade.xnes.co.il/page/101?customerCode=57053565" 
                   class="platform-link" 
                   target="_blank" 
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo"><img src="https://www.psagot.co.il/wp-content/uploads/2025/08/psagot_logo_heb.svg" alt="פסגות"></div>
                <span class="platform-name">פסגות טרייד</span>
                <a href="https://www.psagotrade.com/friendaffiliate/?account=284351" 
                   class="platform-link" 
                   target="_blank" 
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>
        </div>
    </div>
</body>
</html>
