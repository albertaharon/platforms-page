<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פלטפורמות מסחר - המלצות של אלברט אהרון</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f0;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            width: 100%;
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            text-align: center;
            padding: 1.4rem 1rem 1.2rem;
            border-radius: 0 0 22px 22px;
            box-shadow: 0 4px 24px rgba(25, 135, 84, 0.35);
            flex-shrink: 0;
        }

        .page-header h1 {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .page-header p {
            font-size: 0.95em;
            opacity: 0.92;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .platforms-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 560px;
        }

        .platform {
            display: flex;
            align-items: center;
            padding: 22px 20px;
            border-radius: 14px;
            background: white;
            border-right: 5px solid;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .platform:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.13);
        }

        .platform:nth-child(1) { border-right-color: #3f51b5; }
        .platform:nth-child(2) { border-right-color: #e65100; }
        .platform:nth-child(3) { border-right-color: #1a237e; }

        .platform-logo {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 16px;
        }

        .platform-logo img {
            max-width: 130px;
            max-height: 55px;
            object-fit: contain;
        }

        .platform-link {
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            padding: 12px 26px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 3px 10px rgba(25,135,84,0.3);
            flex-shrink: 0;
        }

        .platform-link:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 18px rgba(25, 135, 84, 0.45);
        }

        .platform-link:active {
            transform: scale(0.96);
        }

        @media (max-width: 480px) {
            .page-header h1 { font-size: 1.35em; }
            .platform { padding: 18px 14px; }
            .platform-logo img { max-width: 110px; max-height: 48px; }
            .platform-link { padding: 11px 20px; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>פלטפורמות מסחר</h1>
        <p>🎯 המלצות של אלברט אהרון</p>
    </div>

    <div class="main">
        <div class="platforms-list">

            <div class="platform">
                <div class="platform-logo">
                    <img src="meitav-logo.png" alt="מיטב טרייד">
                </div>
                <a href="https://landing.meitav.co.il/he-IL/landing/trade/tradeleadsfreinds?utm_medium=7F348453D8BBF8D76EDF658AC8D24937"
                   class="platform-link" target="_blank" rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo">
                    <img src="xnes-logo.jpg" alt="אקסלנס טרייד">
                </div>
                <a href="https://xnestrade.xnes.co.il/page/101?customerCode=57053565"
                   class="platform-link" target="_blank" rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo">
                    <img src="psagot-logo.jpeg" alt="פסגות טרייד">
                </div>
                <a href="https://www.psagotrade.com/friendaffiliate/?account=284351"
                   class="platform-link" target="_blank" rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

        </div>
    </div>
</body>
</html>
