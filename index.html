<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פלטפורמות מסחר - המלצות של אלברט אהרון</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-header {
            width: 100%;
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            margin-bottom: 2rem;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 20px rgba(25, 135, 84, 0.3);
        }

        .page-header h1 {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .page-header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .container {
            max-width: 680px;
            width: 100%;
            padding: 0 20px 40px;
        }

        .platforms-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 12px;
            background: white;
            border-right: 5px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: all 0.25s ease;
        }

        .platform:hover {
            transform: translateX(-4px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .platform:nth-child(1) { border-right-color: #198754; }
        .platform:nth-child(2) { border-right-color: #0d6efd; }
        .platform:nth-child(3) { border-right-color: #20c997; }

        .platform-logo {
            min-width: 110px;
            width: 110px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-logo img {
            max-width: 110px;
            max-height: 50px;
            object-fit: contain;
        }

        .platform-name {
            font-size: 1.15em;
            font-weight: 600;
            color: #212529;
            flex: 1;
        }

        .platform-link {
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.25s ease;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(25,135,84,0.25);
        }

        .platform-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 16px rgba(25, 135, 84, 0.4);
        }

        .platform-link:active {
            transform: scale(0.96);
        }

        @media (max-width: 600px) {
            .page-header h1 { font-size: 1.5em; }

            .platform {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }

            .platform-link {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>פלטפורמות מסחר</h1>
        <p>🎯 המלצות של אלברט אהרון</p>
    </div>

    <div class="container">
        <div class="platforms-list">

            <div class="platform">
                <div class="platform-logo">
                    <img src="https://www.meitav.co.il/media/423pf3tq/trade.png" alt="מיטב טרייד">
                </div>
                <span class="platform-name">מיטב טרייד</span>
                <a href="https://landing.meitav.co.il/he-IL/landing/trade/tradeleadsfreinds?utm_medium=7F348453D8BBF8D76EDF658AC8D24937"
                   class="platform-link"
                   target="_blank"
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo">
                    <img src="https://www.xnes.co.il/media/j52ggxis/logoxnes.svg" alt="אקסלנס טרייד">
                </div>
                <span class="platform-name">אקסלנס טרייד</span>
                <a href="https://xnestrade.xnes.co.il/page/101?customerCode=57053565"
                   class="platform-link"
                   target="_blank"
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

            <div class="platform">
                <div class="platform-logo">
                    <img src="https://www.psagot.co.il/wp-content/uploads/2025/08/psagot_logo_heb.svg" alt="פסגות טרייד">
                </div>
                <span class="platform-name">פסגות טרייד</span>
                <a href="https://www.psagotrade.com/friendaffiliate/?account=284351"
                   class="platform-link"
                   target="_blank"
                   rel="noopener noreferrer">
                    לחץ כאן
                </a>
            </div>

        </div>
    </div>
</body>
</html>
