name: Track Visit
on:
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Log visit
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> visits.log
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add visits.log
          git diff --cached --quiet || git commit -m "visit"
          git push
